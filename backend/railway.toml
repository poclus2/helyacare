# Railway configuration for Medusa Backend
# Utilise un Dockerfile custom plutôt que Nixpacks
# Raison : Nixpacks écrase .medusa/ avec un COPY final (gitignored)
# causant "Could not find index.html in the admin build directory"

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
# Les migrations sont dans le CMD du Dockerfile
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
