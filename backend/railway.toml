# Railway configuration for Medusa Backend
# Nixpacks détecte Node.js automatiquement et installe les dépendances

[build]
builder = "NIXPACKS"
buildCommand = "npm run build"

[deploy]
# Lance les migrations puis démarre le serveur
startCommand = "npx medusa db:migrate && npm run start"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
