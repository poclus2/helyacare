name: HelyaCare CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ── 1. Tests & Build ──────────────────────────────────────────────────────
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build Next.js
        env:
          # Variables minimales pour le build (sans secrets sensibles)
          NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_MEDUSA_BACKEND_URL }}
          NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: npm run build:prod


      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: |
            .next/
            public/
            data/
          retention-days: 1

  # ── 2. Deploy sur Railway (production) ───────────────────────────────────
  deploy-production:
    name: Deploy → Railway (Production)
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service helyacare-frontend --detach

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ HelyaCare déployé avec succès sur Railway"
          echo "🌐 URL: ${{ secrets.PRODUCTION_URL }}"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Échec du déploiement HelyaCare"
          exit 1
