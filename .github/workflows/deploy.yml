name: HelyaCare CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ── 1. Build & Validate Frontend ────────────────────────────────────────────
  build-frontend:
    name: "Frontend — Build & Type Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build Next.js (production)
        env:
          NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_MEDUSA_BACKEND_URL }}
          NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: npm run build:prod

  # ── 2. Build & Validate Backend ─────────────────────────────────────────────
  build-backend:
    name: "Backend — Build & Type Check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Build Medusa
        run: npm run build

  # ── 3. Deploy Frontend → Railway ────────────────────────────────────────────
  deploy-frontend:
    name: "Deploy Frontend → Railway"
    needs: build-frontend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service helyacare-frontend --detach

      - name: Confirm Frontend Deploy
        if: success()
        run: echo "✅ Frontend HelyaCare déployé → ${{ secrets.FRONTEND_URL }}"

  # ── 4. Deploy Backend → Railway ─────────────────────────────────────────────
  deploy-backend:
    name: "Deploy Backend → Railway"
    needs: build-backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Backend (Medusa)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service helyacare-backend --detach

      - name: Run Medusa Migrations
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        # Les migrations s'exécutent seulement si le service vient de démarrer
        # Railway relance automatiquement le service après deploy
        run: |
          echo "⏳ Attente démarrage du service backend (60s)..."
          sleep 60
          railway run --service helyacare-backend npx medusa db:migrate || echo "⚠️ Migration déjà à jour"

      - name: Confirm Backend Deploy
        if: success()
        run: echo "✅ Backend Medusa déployé → ${{ secrets.BACKEND_URL }}"
