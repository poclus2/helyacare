# Railway configuration for HelyaCare
# Nixpacks détecte automatiquement Next.js — pas besoin de Dockerfile
# Cela évite le bug Next.js 16 Turbopack + standalone mode

[build]
builder = "NIXPACKS"
buildCommand = "npm run build"

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/prices"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
